<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>01 Profile — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="page">

    <!-- Left decorative panel -->
    <div class="panel-left">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">01 Profile</span>
      </div>
      <div class="panel-text">
        <p class="panel-tagline">Your journey,<br/>visualized.</p>
        <p class="panel-sub">Track XP, audits, projects<br/>and your growth over time.</p>
      </div>
      <div class="panel-decoration">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
    </div>

    <!-- Right login form -->
    <div class="panel-right">
      <div class="form-container">

        <div class="form-header">
          <h1 class="form-title">Sign in</h1>
          <p class="form-subtitle">Use your username or email</p>
        </div>

        <form id="loginForm" novalidate>

          <div class="field-group">
            <label class="field-label" for="identifier">Username or Email</label>
            <input
              class="field-input"
              type="text"
              id="identifier"
              name="identifier"
              placeholder="mkapan or you@email.com"
              autocomplete="username"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrapper">
              <input
                class="field-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error message -->
          <div class="error-box" id="errorBox" role="alert" aria-live="polite">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText">Invalid credentials. Please try again.</span>
          </div>

          <button class="btn-submit" type="submit" id="submitBtn">
            <span class="btn-text">Sign in</span>
            <span class="btn-loader" id="btnLoader"></span>
          </button>

        </form>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
